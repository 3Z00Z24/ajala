<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>العجلة - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Changa:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050510;--panel:#0d0d2b;--panel2:#13133a;--border:#1e1e4a;--cyan:#00e5ff;--green:#00ff88;--yellow:#ffea00;--orange:#ff6d00;--text:#fff;--muted:#8888aa;--red:#ff1744;--purple:#9c27b0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Changa','Cairo',sans-serif;background:var(--bg);color:var(--text);}

/* JOIN SCREEN */
#joinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:18px;}
.logo-a{text-align:center;}
.logo-a h1{font-size:2rem;font-weight:900;font-style:italic;transform:rotate(-4deg);display:inline-block;background:linear-gradient(135deg,var(--cyan),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;}
.join-card{background:var(--panel);border:2px solid var(--purple);border-radius:18px;padding:26px;width:100%;max-width:330px;}
.join-card h2{color:var(--purple);text-align:center;font-size:1.1rem;margin-bottom:16px;}
.join-card input{width:100%;background:var(--panel2);border:2px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:1.1rem;text-align:center;margin-bottom:14px;display:block;}
.join-card input:focus{outline:none;border-color:var(--purple);}
.btn-join-a{width:100%;background:linear-gradient(135deg,var(--purple),#9c27b0);color:#fff;border:none;border-radius:12px;padding:14px;font-size:1.1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}
.wait-msg{color:var(--muted);font-size:0.88rem;text-align:center;margin-top:8px;}

/* WAITING FOR APPROVAL */
#waitScreen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;gap:16px;}
.wait-admin{background:var(--panel);border:2px solid var(--purple);border-radius:18px;padding:26px;max-width:330px;width:100%;}

/* ADMIN SCREEN */
#adminScreen{display:none;flex-direction:column;height:100vh;}

/* Header */
.aheader{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--panel);border-bottom:2px solid var(--purple);flex-shrink:0;}
.admin-badge{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;font-size:0.75rem;font-weight:900;padding:3px 10px;border-radius:20px;}
.round-info{font-size:0.78rem;color:var(--cyan);font-weight:700;}

/* Tabs */
.tabs{display:flex;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:0.82rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;font-family:'Changa','Cairo',sans-serif;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}

/* Tab content */
.tab-content{display:none;flex:1;overflow-y:auto;padding:16px;}
.tab-content.active{display:block;}

/* Word entry tab */
.section-title{font-size:0.75rem;color:var(--muted);margin-bottom:10px;font-weight:700;letter-spacing:0.5px;}
.input-group{margin-bottom:14px;}
.input-group label{font-size:0.72rem;color:var(--muted);display:block;margin-bottom:5px;}
.input-group input{width:100%;background:var(--panel2);border:2px solid var(--border);border-radius:12px;padding:13px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:1rem;direction:rtl;}
.input-group input:focus{outline:none;border-color:var(--purple);}

.btn-send{width:100%;background:linear-gradient(135deg,var(--green),#00c853);color:#000;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:4px;}
.btn-send:disabled{opacity:0.4;cursor:not-allowed;}

/* Status card */
.status-card{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:14px;}
.status-card .sc-label{font-size:0.68rem;color:var(--muted);margin-bottom:4px;}
.status-card .sc-val{font-size:1rem;font-weight:700;color:var(--cyan);}

/* Need word alert */
.need-word-alert{background:rgba(255,234,0,0.1);border:2px solid var(--yellow);border-radius:13px;padding:14px;margin-bottom:14px;text-align:center;display:none;}
.need-word-alert p{color:var(--yellow);font-weight:700;font-size:0.9rem;}

/* Points tab */
.player-pts-card{background:var(--panel);border:2px solid var(--border);border-radius:13px;padding:14px;margin-bottom:12px;transition:all 0.2s;}
.player-pts-card.editing{border-color:var(--purple);}
.pp-name{font-size:1rem;font-weight:800;color:var(--cyan);margin-bottom:8px;}
.pp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pp-label{font-size:0.68rem;color:var(--muted);width:70px;flex-shrink:0;}
.pp-val{font-size:1.1rem;font-weight:800;color:var(--yellow);min-width:50px;}
.pp-input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:1rem;font-family:'Cairo',sans-serif;width:90px;text-align:center;}
.pp-input:focus{outline:none;border-color:var(--purple);}
.btn-edit-pts{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:0.8rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:6px;}
.btn-save-pts{background:var(--green);color:#000;border:none;border-radius:8px;padding:6px 14px;font-size:0.8rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:6px;}
.pp-total{font-size:0.85rem;color:var(--green);font-weight:700;}

/* Toast */
.toast-a{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:2px solid var(--purple);border-radius:12px;padding:10px 22px;font-size:0.88rem;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast-a.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinScreen">
  <div class="logo-a">
    <svg width="60" height="60" viewBox="0 0 120 120" style="display:block;margin:0 auto 6px">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#1e1e4a" stroke-width="3"/>
      <path d="M60,5 A55,55 0 0,1 115,60" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M115,60 A55,55 0 0,1 60,115" fill="none" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
      <path d="M60,115 A55,55 0 0,1 5,60" fill="none" stroke="#ffea00" stroke-width="8" stroke-linecap="round"/>
      <path d="M5,60 A55,55 0 0,1 60,5" fill="none" stroke="#ff6d00" stroke-width="8" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="16" fill="#050510" stroke="#9c27b0" stroke-width="2.5"/>
      <text x="60" y="65" text-anchor="middle" font-size="10" font-weight="900" font-family="Cairo" fill="white" transform="rotate(-5,60,60)">عجلة</text>
    </svg>
    <h1>العجلة</h1>
    <div style="font-size:0.75rem;color:var(--purple);font-weight:700;margin-top:4px">👑 لوحة Admin</div>
  </div>
  <div class="join-card">
    <h2>دخول كـ Admin</h2>
    <input type="text" id="adminNameInput" placeholder="اسمك (هوست ثاني)" maxlength="20" autocomplete="off"/>
    <button class="btn-join-a" onclick="joinAsAdmin()">دخول 👑</button>
    <div class="wait-msg">سيطلب المقدم الرئيسي الموافقة على دخولك</div>
  </div>
</div>

<!-- WAITING -->
<div id="waitScreen">
  <div class="wait-admin">
    <div style="font-size:3rem;margin-bottom:12px">⏳</div>
    <div style="font-size:1.1rem;font-weight:700;color:var(--purple);margin-bottom:8px">طلبك أُرسل!</div>
    <div style="font-size:0.85rem;color:var(--muted)">انتظر موافقة المقدم الرئيسي على التابلت...</div>
    <div id="waitAdminStatus" style="margin-top:12px;font-size:0.8rem;color:var(--muted)"></div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen">
  <div class="aheader">
    <span class="admin-badge">👑 Admin</span>
    <span class="round-info" id="aRoundInfo">-</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('wordTab',this)">📝 الكلمة</div>
    <div class="tab" onclick="switchTab('ptsTab',this)">🏅 النقاط</div>
  </div>

  <!-- WORD TAB -->
  <div class="tab-content active" id="wordTab">
    <div class="need-word-alert" id="needWordAlert">
      <p>⚠️ المقدم ينتظر كلمة جديدة!</p>
    </div>

    <div class="status-card">
      <div class="sc-label">الجولة الحالية</div>
      <div class="sc-val" id="aRoundName">-</div>
    </div>

    <div class="status-card" id="currentWordCard" style="display:none">
      <div class="sc-label">الكلمة الحالية</div>
      <div class="sc-val" id="aCurrentWord">-</div>
      <div style="font-size:0.68rem;color:var(--muted);margin-top:2px">الفئة: <span id="aCurrentCat">-</span></div>
    </div>

    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:12px;font-weight:700">أدخل كلمة / عبارة الجولة</div>

    <div class="input-group">
      <label>الفئة</label>
      <input type="text" id="aWordCat" placeholder="مثال: رياضة، أماكن..." autocomplete="off"/>
    </div>
    <div class="input-group">
      <label>العبارة أو الكلمة</label>
      <input type="text" id="aWordText" placeholder="اكتب العبارة هنا" autocomplete="off"/>
    </div>
    <button class="btn-send" id="btnSendWord" onclick="sendWord()">إرسال الكلمة للمقدم ✓</button>
  </div>

  <!-- POINTS TAB -->
  <div class="tab-content" id="ptsTab">
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:14px;font-weight:700">تعديل نقاط اللاعبين</div>
    <div id="ptsCards"></div>
  </div>
</div>

<div class="toast-a" id="toastAdmin"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyASPPu2V3ZPeJOMTYK_1A-1LxJz-CFFCmc",authDomain:"al-ajala.firebaseapp.com",databaseURL:"https://al-ajala-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"al-ajala",storageBucket:"al-ajala.firebasestorage.app",messagingSenderId:"634499303447",appId:"1:634499303447:web:4a6a6841db4652ab083452"};
const app=initializeApp(FB);
const db=getDatabase(app);

let myName='', isApproved=false, joinKey='';
let lastGameData=null;

// ===== JOIN =====
window.joinAsAdmin=function(){
  const name=document.getElementById('adminNameInput').value.trim();
  if(!name){alert('أدخل اسمك');return;}
  myName=name;
  document.getElementById('joinScreen').style.display='none';
  document.getElementById('waitScreen').style.display='flex';
  // أرسل طلب انضمام عادي، الهوست سيختار Admin
  const jRef=push(ref(db,'joinReqs'));
  joinKey=jRef.key;
  set(jRef,{name:'👑 '+name+' (Admin)',ts:Date.now()});
  watchApproval();
};

function watchApproval(){
  onValue(ref(db,'adminDevice'),snap=>{
    const d=snap.val();
    if(d&&d.approved&&!isApproved){
      isApproved=true;
      document.getElementById('waitScreen').style.display='none';
      document.getElementById('adminScreen').style.display='flex';
      showToastA('✅ تمت الموافقة! أهلاً Admin');
    }
  });
}

// ===== GAME LISTENER =====
onValue(ref(db,'game'),snap=>{
  const d=snap.val();if(!d||!isApproved)return;
  lastGameData=d;
  // Update round info
  const rName=d.rName||'-';
  document.getElementById('aRoundInfo').textContent=rName;
  document.getElementById('aRoundName').textContent=rName;
  // Current word (hidden if fish round still going)
  if(d.cat&&d.wd&&d.wd.length>0){
    const wordStr=[...d.wd].filter(c=>c.t==='c').map(c=>c.ch).join('');
    document.getElementById('aCurrentWord').textContent='****'; // مخفية
    document.getElementById('aCurrentCat').textContent=d.cat;
    document.getElementById('currentWordCard').style.display='block';
  }
  // Render points
  renderPoints(d);
});

// ===== NEED WORD LISTENER =====
onValue(ref(db,'needWord'),snap=>{
  const d=snap.val();
  const alert=document.getElementById('needWordAlert');
  if(d&&d.ts){
    alert.style.display='block';
    // ملء الفئة تلقائياً لو فيها
    if(d.rName)document.getElementById('aRoundName').textContent=d.rName;
    showToastA('⚠️ المقدم ينتظر كلمة جديدة!');
  } else {
    alert.style.display='none';
  }
});

// ===== SEND WORD =====
window.sendWord=function(){
  const word=document.getElementById('aWordText').value.trim();
  const cat=document.getElementById('aWordCat').value.trim()||'عام';
  if(!word){showToastA('أدخل الكلمة أولاً');return;}
  set(ref(db,'adminWord'),{word,cat,ts:Date.now()});
  document.getElementById('aWordText').value='';
  document.getElementById('aWordCat').value='';
  showToastA('✅ تم إرسال الكلمة للمقدم!');
  document.getElementById('needWordAlert').style.display='none';
};

// ===== POINTS =====
function renderPoints(d){
  if(!d.players)return;
  const el=document.getElementById('ptsCards');
  const round=d.round||0;
  // حفظ حالة التعديل الحالية
  const editingIdx=window._editingIdx;
  el.innerHTML='';
  d.players.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='player-pts-card'+(i===editingIdx?' editing':'');
    const editing=i===editingIdx;
    card.innerHTML=`
      <div class="pp-name">${i===d.turn?'🎯 ':''} ${p.name}</div>
      <div class="pp-row">
        <span class="pp-label">نقاط الجولة:</span>
        ${editing
          ? `<input class="pp-input" id="editRpts${i}" type="number" value="${p.rpts?.[round]||0}" min="0"/>`
          : `<span class="pp-val">${p.rpts?.[round]||0}</span>`
        }
      </div>
      <div class="pp-row">
        <span class="pp-label">المجموع:</span>
        <span class="pp-total">${p.total||0} 🏅</span>
      </div>
      ${editing
        ? `<button class="btn-save-pts" onclick="savePoints(${i},${round})">✓ حفظ</button>
           <button class="btn-edit-pts" style="background:#555;margin-right:6px" onclick="cancelEdit()">✗ إلغاء</button>`
        : `<button class="btn-edit-pts" onclick="startEdit(${i})">✏️ تعديل</button>`
      }
    `;
    el.appendChild(card);
  });
}

window.startEdit=function(idx){
  window._editingIdx=idx;
  if(lastGameData)renderPoints(lastGameData);
};
window.cancelEdit=function(){
  window._editingIdx=undefined;
  if(lastGameData)renderPoints(lastGameData);
};
window.savePoints=function(playerIdx,round){
  const inp=document.getElementById(`editRpts${playerIdx}`);
  if(!inp)return;
  const val=parseInt(inp.value)||0;
  set(ref(db,'adminEdit'),{playerIdx,round,rpts:val,ts:Date.now()});
  window._editingIdx=undefined;
  showToastA('✅ تم إرسال التعديل');
};

// ===== TABS =====
window.switchTab=function(tabId,el){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  el.classList.add('active');
};

// ===== TOAST =====
let _toastT;
function showToastA(msg){
  const t=document.getElementById('toastAdmin');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
