<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>العجلة - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Changa:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050510;--panel:#0d0d2b;--panel2:#13133a;--border:#1e1e4a;--cyan:#00e5ff;--green:#00ff88;--yellow:#ffea00;--text:#fff;--muted:#8888aa;--red:#ff1744;--purple:#9c27b0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Changa','Cairo',sans-serif;background:var(--bg);color:var(--text);}

#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:16px;}
.login-card{background:var(--panel);border:2px solid var(--purple);border-radius:18px;padding:26px;width:100%;max-width:320px;text-align:center;}
.login-card h2{color:var(--purple);margin-bottom:6px;font-size:1.1rem;}
.login-card p{color:var(--muted);font-size:0.8rem;margin-bottom:16px;}
.login-card input{width:100%;background:var(--panel2);border:2px solid var(--border);border-radius:11px;padding:13px;color:var(--text);font-family:'Cairo',sans-serif;font-size:1rem;text-align:center;margin-bottom:12px;display:block;}
.login-card input:focus{outline:none;border-color:var(--purple);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;border:none;border-radius:11px;padding:13px;font-size:1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}
.err{color:var(--red);font-size:0.82rem;margin-top:6px;min-height:18px;}

#adminScreen{display:none;flex-direction:column;height:100vh;}
.ahead{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:var(--panel);border-bottom:2px solid var(--purple);flex-shrink:0;}
.abadge{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;font-size:0.72rem;font-weight:900;padding:3px 10px;border-radius:20px;}
.ainfo{font-size:0.75rem;color:var(--cyan);font-weight:700;}

.tabs{display:flex;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:0.75rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;font-family:'Changa','Cairo',sans-serif;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}

.tabpane{display:none;flex:1;overflow-y:auto;padding:13px;}
.tabpane.active{display:block;}

/* Word tab */
.alert-box{background:rgba(255,234,0,0.1);border:2px solid var(--yellow);border-radius:11px;padding:11px;margin-bottom:11px;text-align:center;display:none;}
.alert-box p{color:var(--yellow);font-weight:700;font-size:0.85rem;}
.info-box{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:11px;}
.ib-lbl{font-size:0.62rem;color:var(--muted);margin-bottom:2px;}
.ib-val{font-size:0.9rem;font-weight:700;color:var(--cyan);}
.slbl{font-size:0.7rem;color:var(--muted);font-weight:700;margin-bottom:9px;}
.ig{margin-bottom:11px;}
.ig label{font-size:0.68rem;color:var(--muted);display:block;margin-bottom:4px;}
.ig input{width:100%;background:var(--panel2);border:2px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.95rem;}
.ig input:focus{outline:none;border-color:var(--purple);}
.btn-green{width:100%;background:linear-gradient(135deg,var(--green),#00c853);color:#000;border:none;border-radius:11px;padding:12px;font-size:0.95rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}

/* Guess tab */
.guess-panel{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:11px;}
.guess-panel h3{font-size:0.85rem;color:var(--cyan);margin-bottom:10px;}
.word-disp{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;direction:rtl;padding:6px;margin-bottom:12px;}
.wc{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wc.hidden{background:#0a1628;border:2px solid #1a3a6a;}
.wc.revealed{background:#0a1628;border:2px solid #2a5fa0;}
.wc.space{background:#fff;border:2px solid #ddd;}
.wc span{font-size:0.95rem;font-weight:800;color:#fff;font-family:'Changa','Cairo',sans-serif;}
.guess-row{display:flex;gap:8px;align-items:center;}
.guess-in{background:var(--panel2);border:2px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-size:1.1rem;font-family:'Cairo',sans-serif;width:58px;text-align:center;}
.guess-in:focus{outline:none;border-color:var(--cyan);}
.btn-guess{background:var(--cyan);color:#000;border:none;border-radius:10px;padding:10px 18px;font-size:0.88rem;font-weight:800;font-family:'Cairo',sans-serif;cursor:pointer;}
.btn-solve{background:var(--green);color:#000;border:none;border-radius:10px;padding:10px 18px;font-size:0.88rem;font-weight:800;font-family:'Cairo',sans-serif;cursor:pointer;}
.vowel-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.vbtn{background:rgba(255,234,0,0.1);border:1px solid var(--yellow);color:var(--yellow);border-radius:7px;padding:5px 12px;font-size:0.9rem;font-family:'Cairo',sans-serif;cursor:pointer;font-weight:700;}
.phase-info{font-size:0.75rem;color:var(--muted);margin-bottom:8px;}

/* Points tab */
.pcard{background:var(--panel);border:2px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;}
.pcard.ed{border-color:var(--purple);}
.pc-name{font-size:0.95rem;font-weight:800;color:var(--cyan);margin-bottom:7px;}
.pc-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.pc-lbl{font-size:0.62rem;color:var(--muted);width:60px;flex-shrink:0;}
.pc-val{font-size:1rem;font-weight:800;color:var(--yellow);}
.pc-tot{font-size:0.85rem;font-weight:700;color:var(--green);}
.pc-in{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 9px;font-size:0.95rem;font-family:'Cairo',sans-serif;width:80px;text-align:center;}
.pc-in:focus{outline:none;border-color:var(--purple);}
.btn-ed{background:var(--purple);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:0.75rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:4px;}
.btn-sv{background:var(--green);color:#000;border:none;border-radius:7px;padding:5px 12px;font-size:0.75rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:4px;margin-left:5px;}
.btn-cn{background:#444;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:0.75rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:4px;margin-left:5px;}

.toast-a{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:2px solid var(--purple);border-radius:11px;padding:9px 20px;font-size:0.85rem;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast-a.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="loginScreen">
  <div style="font-size:2.5rem;text-align:center">👑</div>
  <div class="login-card">
    <h2>لوحة Admin</h2>
    <p>اكتب كلمة السر للدخول</p>
    <input type="password" id="passIn" placeholder="كلمة السر"
      oninput="if(this.value==='Admin AZ')doLogin()"
      onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button class="btn-login" onclick="tryLogin()">دخول 👑</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<div id="adminScreen">
  <div class="ahead">
    <span class="abadge">👑 Admin</span>
    <span class="ainfo" id="aInfo">-</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="sw('wordPane',this)">📝 كلمة</div>
    <div class="tab" onclick="sw('guessPane',this)">🔤 تخمين</div>
    <div class="tab" onclick="sw('ptsPane',this)">🏅 نقاط</div>
  </div>

  <!-- WORD TAB -->
  <div class="tabpane active" id="wordPane">
    <div class="alert-box" id="needAlert"><p>⚠️ المقدم ينتظر كلمة جديدة!</p></div>
    <div class="info-box">
      <div class="ib-lbl">الجولة</div>
      <div class="ib-val" id="aRnd">-</div>
    </div>
    <div class="slbl">أدخل كلمة/عبارة الجولة</div>
    <div class="ig"><label>الفئة</label><input type="text" id="wCat" placeholder="رياضة، أماكن..." autocomplete="off"/></div>
    <div class="ig"><label>الكلمة أو العبارة</label><input type="text" id="wText" placeholder="اكتب هنا" autocomplete="off" onkeydown="if(event.key==='Enter')sendWord()"/></div>
    <button class="btn-green" onclick="sendWord()">إرسال للمقدم ✓</button>
  </div>

  <!-- GUESS TAB -->
  <div class="tabpane" id="guessPane">
    <div class="guess-panel">
      <h3>الكلمة الحالية</h3>
      <div class="phase-info" id="gPhaseInfo">-</div>
      <div class="word-disp" id="gWordDisp"></div>
      <div class="vowel-row">
        <button class="vbtn" onclick="sendVowel('alef')">أ</button>
        <button class="vbtn" onclick="sendVowel('waw')">و</button>
        <button class="vbtn" onclick="sendVowel('ya')">ي</button>
      </div>
      <div class="guess-row">
        <input class="guess-in" id="gLetterIn" placeholder="ح" maxlength="2"/>
        <button class="btn-guess" onclick="sendGuess()">خمّن</button>
        <button class="btn-solve" onclick="sendSolve()">حل</button>
      </div>
    </div>
  </div>

  <!-- POINTS TAB -->
  <div class="tabpane" id="ptsPane">
    <div class="slbl">تعديل نقاط اللاعبين</div>
    <div id="ptsCards"></div>
  </div>
</div>

<div class="toast-a" id="toastA"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyASPPu2V3ZPeJOMTYK_1A-1LxJz-CFFCmc",authDomain:"al-ajala.firebaseapp.com",databaseURL:"https://al-ajala-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"al-ajala",storageBucket:"al-ajala.firebasestorage.app",messagingSenderId:"634499303447",appId:"1:634499303447:web:4a6a6841db4652ab083452"};
const app=initializeApp(FB);
const db=getDatabase(app);

let ok=false,game=null,edIdx=null;

window.tryLogin=function(){
  if(document.getElementById('passIn').value==='Admin AZ')doLogin();
  else document.getElementById('errMsg').textContent='كلمة السر غلط!';
};
window.doLogin=function(){
  ok=true;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminScreen').style.display='flex';
  toast('✅ أهلاً Admin!');
  startListeners();
};

function startListeners(){
  onValue(ref(db,'game'),snap=>{
    const d=snap.val();
    if(!d||!ok)return;
    game=d;
    document.getElementById('aInfo').textContent=d.rName||'-';
    document.getElementById('aRnd').textContent=d.rName||'-';
    updateGuessPanel(d);
    renderPts(d);
  });
  onValue(ref(db,'needWord'),snap=>{
    const d=snap.val();
    document.getElementById('needAlert').style.display=(d&&d.ts)?'block':'none';
    if(d&&d.ts)toast('⚠️ المقدم ينتظر كلمة!');
  });
}

// ===== WORD =====
window.sendWord=function(){
  const w=document.getElementById('wText').value.trim();
  const c=document.getElementById('wCat').value.trim()||'عام';
  if(!w){toast('أدخل الكلمة');return;}
  set(ref(db,'adminWord'),{word:w,cat:c,ts:Date.now()});
  document.getElementById('wText').value='';
  document.getElementById('wCat').value='';
  toast('✅ تم إرسال الكلمة!');
};

// ===== GUESS PANEL =====
const LOGO='<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#1a5fa8" stroke-width="6"/><circle cx="60" cy="60" r="15" fill="none" stroke="#1a5fa8" stroke-width="4"/></svg>';

function updateGuessPanel(d){
  const phase=d.phase||'idle';
  const turn=d.players?.[d.turn]?.name||'-';
  document.getElementById('gPhaseInfo').textContent=`المرحلة: ${phase} | الدور: ${turn}`;
  // عرض الكلمة
  const el=document.getElementById('gWordDisp');
  el.innerHTML='';
  if(d.wd&&Array.isArray(d.wd)){
    d.wd.forEach(cell=>{
      const div=document.createElement('div');
      if(cell.t==='s'){div.className='wc space';}
      else{
        div.className='wc '+(cell.r?'revealed':'hidden');
        if(cell.r){const s=document.createElement('span');s.textContent=cell.ch;div.appendChild(s);}
      }
      el.appendChild(div);
    });
  }
}

window.sendGuess=function(){
  const l=document.getElementById('gLetterIn').value.trim();
  if(!l)return;
  document.getElementById('gLetterIn').value='';
  set(ref(db,'adminGuess'),{letter:l,ts:Date.now()});
  toast(`خمّن: ${l}`);
};

window.sendVowel=function(type){
  set(ref(db,'adminGuess'),{letter:type==='alef'?'أ':type==='waw'?'و':'ي',vowel:true,ts:Date.now()});
};

window.sendSolve=function(){
  const ans=prompt('اكتب العبارة كاملة:');
  if(!ans)return;
  set(ref(db,'adminSolve'),{answer:ans,ts:Date.now()});
  toast('تم إرسال الحل');
};

// ===== POINTS =====
function getRpts(p,rnd){
  if(!p)return 0;
  const v=p['r'+rnd];
  if(v!==undefined)return v;
  if(Array.isArray(p.rpts))return p.rpts[rnd]||0;
  return 0;
}

function renderPts(d){
  if(!d.players)return;
  const rnd=d.round||0;
  const el=document.getElementById('ptsCards');
  el.innerHTML='';
  d.players.forEach((p,i)=>{
    const rpts=getRpts(p,rnd);
    const card=document.createElement('div');
    card.className='pcard'+(i===edIdx?' ed':'');
    if(i===edIdx){
      card.innerHTML=`
        <div class="pc-name">${p.name}</div>
        <div class="pc-row"><span class="pc-lbl">نقاط الجولة:</span><input class="pc-in" id="ev${i}" type="number" value="${rpts}"/></div>
        <div class="pc-row"><span class="pc-lbl">المجموع:</span><span class="pc-tot">${p.total||0} 🏅</span></div>
        <button class="btn-sv" onclick="savePts(${i},${rnd})">✓ حفظ</button>
        <button class="btn-cn" onclick="cancelEd()">✗ إلغاء</button>`;
    } else {
      card.innerHTML=`
        <div class="pc-name">${i===d.turn?'🎯 ':''} ${p.name}</div>
        <div class="pc-row"><span class="pc-lbl">نقاط الجولة:</span><span class="pc-val">${rpts}</span></div>
        <div class="pc-row"><span class="pc-lbl">المجموع:</span><span class="pc-tot">${p.total||0} 🏅</span></div>
        <button class="btn-ed" onclick="startEd(${i})">✏️ تعديل</button>`;
    }
    el.appendChild(card);
  });
}
window.startEd=function(i){edIdx=i;if(game)renderPts(game);};
window.cancelEd=function(){edIdx=null;if(game)renderPts(game);};
window.savePts=function(idx,rnd){
  const v=parseInt(document.getElementById('ev'+idx)?.value)||0;
  set(ref(db,'adminEdit'),{playerIdx:idx,round:rnd,rpts:v,ts:Date.now()});
  edIdx=null;
  toast('✅ تم التعديل');
};

// ===== TABS =====
window.sw=function(id,el){
  document.querySelectorAll('.tabpane').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
};

// ===== TOAST =====
let _tt;
function toast(m){
  const t=document.getElementById('toastA');
  t.textContent=m;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
