<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>العجلة - شاشة اللاعب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050510;
  --panel: #0d0d2b;
  --panel2: #13133a;
  --border: #1e1e4a;
  --cyan: #00e5ff;
  --green: #00ff88;
  --yellow: #ffea00;
  --orange: #ff6d00;
  --text: #ffffff;
  --muted: #8888aa;
  --red: #ff1744;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  background-image:
    radial-gradient(ellipse at 10% 20%, rgba(0,229,255,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(0,255,136,0.05) 0%, transparent 50%);
}

/* Player select screen */
#selectScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 20px;
  gap: 20px;
}

.logo-header {
  text-align: center;
  margin-bottom: 10px;
}
.logo-header h1 {
  font-size: 2.5rem;
  font-weight: 900;
  font-style: italic;
  transform: rotate(-4deg);
  display: inline-block;
  background: linear-gradient(135deg, var(--cyan), var(--green), var(--yellow));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
}

.select-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 25px;
  width: 100%;
  max-width: 340px;
}
.select-card h2 {
  text-align: center;
  color: var(--cyan);
  font-size: 1.1rem;
  margin-bottom: 20px;
}
.player-btns {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.btn-player {
  background: var(--panel2);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.btn-player:hover, .btn-player:active {
  border-color: var(--cyan);
  background: rgba(0,229,255,0.1);
}

/* Player screen */
#playerScreen {
  display: none;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Header */
.player-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.player-name-display {
  font-size: 1rem;
  font-weight: 700;
  color: var(--cyan);
}
.round-badge {
  font-size: 0.75rem;
  color: var(--muted);
  background: var(--panel2);
  padding: 4px 10px;
  border-radius: 20px;
}

/* Main content area - takes most of screen */
.main-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* Wheel view */
#wheelView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 10px;
  gap: 10px;
}

.wheel-wrap-player {
  position: relative;
  flex-shrink: 0;
}
.wheel-pointer-p {
  position: absolute;
  top: -14px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 11px solid transparent;
  border-right: 11px solid transparent;
  border-top: 22px solid var(--yellow);
  z-index: 10;
  filter: drop-shadow(0 2px 6px rgba(255,234,0,0.8));
}

/* Spin instruction */
.spin-hint {
  font-size: 0.85rem;
  color: var(--muted);
  text-align: center;
}

/* Spin gesture area */
#spinGesture {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 20;
  cursor: grab;
  background: transparent;
}
#spinGesture.active { cursor: grabbing; }

.spin-arrow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80px; height: 80px;
  border: 3px solid rgba(0,229,255,0.3);
  border-radius: 50%;
  border-top-color: var(--cyan);
  animation: rotateSpin 2s linear infinite;
  pointer-events: none;
}
@keyframes rotateSpin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Word display for player */
#wordViewPlayer {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 10px 12px;
  gap: 8px;
}

.category-pill {
  background: rgba(0,229,255,0.1);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-size: 0.8rem;
  padding: 4px 16px;
  border-radius: 20px;
}

.word-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: center;
  direction: rtl;
  max-width: 100%;
}
.wletter {
  width: 34px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 900;
  transition: all 0.3s;
  flex-shrink: 0;
}
.wletter.revealed {
  color: var(--yellow);
  border-bottom: 2px solid var(--yellow);
  animation: popInP 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.wletter.hidden {
  background: rgba(0,229,255,0.08);
  border: 1.5px solid rgba(0,229,255,0.2);
  border-radius: 5px;
}
.wletter.space { width: 14px; }
@keyframes popInP {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* Fishing view */
#fishingView {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 20px;
  gap: 15px;
  text-align: center;
}
.fishing-title-p { font-size: 1.2rem; color: var(--green); font-weight: 700; }
.fishing-word-p { font-size: 1.8rem; color: var(--yellow); font-weight: 900; letter-spacing: 4px; min-height: 60px; word-break: break-all; }

/* Final view */
#finalView {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 20px;
  gap: 15px;
  text-align: center;
}

/* Scores panel - bottom */
.scores-panel {
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
}
.score-mini {
  flex: 1;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  text-align: center;
  transition: all 0.3s;
}
.score-mini.active {
  border-color: var(--cyan);
  background: rgba(0,229,255,0.08);
}
.score-mini .sm-name { font-size: 0.7rem; color: var(--muted); }
.score-mini .sm-round { font-size: 1.1rem; font-weight: 900; color: var(--yellow); }
.score-mini .sm-total { font-size: 0.7rem; color: var(--green); }

/* Status overlay */
.status-toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 24px;
  font-size: 1rem;
  font-weight: 700;
  opacity: 0;
  transition: all 0.4s;
  z-index: 100;
  white-space: nowrap;
}
.status-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* My score highlighted view (end of round) */
#endRoundView {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 25px;
  gap: 20px;
  text-align: center;
}
.big-round-score {
  font-size: 4rem;
  font-weight: 900;
  color: var(--yellow);
  line-height: 1;
}
.big-total-score {
  font-size: 2rem;
  font-weight: 700;
  color: var(--green);
}
.score-label-big { font-size: 1rem; color: var(--muted); }
</style>
</head>

<div id="selectScreen">
  <div class="logo-header">
    <svg width="80" height="80" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:8px">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#1e1e4a" stroke-width="3"/>
      <path d="M60,5 A55,55 0 0,1 115,60" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M115,60 A55,55 0 0,1 60,115" fill="none" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
      <path d="M60,115 A55,55 0 0,1 5,60" fill="none" stroke="#ffea00" stroke-width="8" stroke-linecap="round"/>

<!-- Player game screen -->
<div id="playerScreen">

  <div class="player-header">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyASPPu2V3ZPeJOMTYK_1A-1LxJz-CFFCmc",
  authDomain: "al-ajala.firebaseapp.com",
  databaseURL: "https://al-ajala-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "al-ajala",
  storageBucket: "al-ajala.firebasestorage.app",
  messagingSenderId: "634499303447",
  appId: "1:634499303447:web:4a6a6841db4652ab083452"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myPlayerIndex = -1;
let myName = '';
let lastGameState = null;
let wheelAngle = 0;
let spinning = false;
let canSpin = false;
let lastRound = -1;

// ==================== SETUP CANVAS ====================
const canvas = document.getElementById('playerWheelCanvas');
const ctx = canvas.getContext('2d');

function setCanvasSize() {
  const vw = Math.min(window.innerWidth, 420);
  const size = Math.min(vw - 40, 320);
  canvas.width = size;
  canvas.height = size;
}
setCanvasSize();
window.addEventListener('resize', () => { setCanvasSize(); drawPlayerWheel(); });

const WHEEL_SLICES = [
  { label: '100', color: '#00e5ff' },
  { label: '35', color: '#00ff88' },
  { label: '200', color: '#ffea00' },
  { label: '25', color: '#ff6d00' },
  { label: '35', color: '#00e5ff' },
  { label: '45', color: '#00ff88' },
  { label: '15', color: '#ffea00' },
  { label: '100', color: '#ff6d00' },
  { label: '20', color: '#00e5ff' },
  { label: '50', color: '#00ff88' },
  { label: '25', color: '#ffea00' },
  { label: '40', color: '#ff6d00' },
  { label: '20', color: '#00e5ff' },
  { label: '45', color: '#00ff88' },
  { label: '30', color: '#ffea00' },
  { label: '50', color: '#ff6d00' },
  { label: 'راحت عليك', color: '#555' },
  { label: 'راحت عليك', color: '#555' },
  { label: 'إفلاس', color: '#222' },
  { label: 'عطيناك ثنتين', color: '#9c27b0' },
  { label: 'وسيلة مساعدة', color: '#e91e63' },
  { label: 'تحدي', color: '#ff5722' },
  { label: 'تحدي', color: '#ff5722' },
];

let currentSlices = JSON.parse(JSON.stringify(WHEEL_SLICES));

function drawPlayerWheel() {
  const W = canvas.width, cx = W/2, cy = W/2, r = W/2 - 4;
  ctx.clearRect(0,0,W,W);
  const slices = currentSlices;
  const n = slices.length;
  const arc = (2 * Math.PI) / n;
  for (let i = 0; i < n; i++) {
    const start = wheelAngle + i * arc - Math.PI/2;
    const end = start + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = slices[i].color;
    ctx.fill();
    ctx.strokeStyle = '#050510';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${slices[i].label.length > 4 ? '8' : '10'}px Cairo`;
    ctx.fillText(slices[i].label, r - 6, 4);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 16, 0, 2*Math.PI);
  ctx.fillStyle = '#050510';
  ctx.fill();
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ==================== SPIN GESTURE ====================
const spinGesture = document.getElementById('spinGesture');
let touchStartY = 0;
let touchStartX = 0;
let gestureActive = false;

spinGesture.addEventListener('touchstart', (e) => {
  if (!canSpin) return;
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  gestureActive = true;
  spinGesture.classList.add('active');
}, { passive: true });

spinGesture.addEventListener('touchend', (e) => {
  if (!canSpin || !gestureActive) return;
  gestureActive = false;
  spinGesture.classList.remove('active');
  const dy = touchStartY - e.changedTouches[0].clientY;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 30) {
    triggerSpin();
  }
}, { passive: true });

// Also allow click
spinGesture.addEventListener('click', () => {
  if (canSpin) triggerSpin();
});

function triggerSpin() {
  if (!canSpin || spinning) return;
  canSpin = false;
  spinGesture.style.display = 'none';
  document.getElementById('spinHint').textContent = '🎡 العجلة تدور...';

  // Notify host
  set(ref(db, 'spin_request'), {
    playerId: myPlayerIndex,
    timestamp: Date.now()
  });

  // Animate wheel locally
  animateLocalSpin();
}

function animateLocalSpin() {
  spinning = true;
  const totalAngle = (5 + Math.random() * 5) * 2 * Math.PI;
  const duration = 3500;
  const startAngle = wheelAngle;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    wheelAngle = startAngle + totalAngle * ease;
    drawPlayerWheel();
    if (progress < 1) requestAnimationFrame(animate);
    else spinning = false;
  }
  requestAnimationFrame(animate);
}

// ==================== PLAYER SELECT ====================
onValue(ref(db, 'game'), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;
  lastGameState = data;

  if (myPlayerIndex === -1) {
    // Show player buttons
    if (data.players && data.players.length > 0) {
      const btns = document.getElementById('playerBtns');
      btns.innerHTML = '';
      data.players.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn-player';
        btn.textContent = p.name;
        btn.onclick = () => selectPlayer(i, p.name, data);
        btns.appendChild(btn);
      });
    }
    return;
  }

  updatePlayerScreen(data);
});

function selectPlayer(idx, name, data) {
  myPlayerIndex = idx;
  myName = name;
  document.getElementById('selectScreen').style.display = 'none';
  document.getElementById('playerScreen').style.display = 'flex';
  document.getElementById('myNameDisplay').textContent = name;
  updatePlayerScreen(data);
}

// ==================== UPDATE SCREEN ====================
function updatePlayerScreen(data) {
  if (!data) return;

  const roundType = data.roundType || 'wheel';
  const phase = data.phase || 'setup';
  const round = data.round || 0;

  document.getElementById('roundBadge').textContent = data.roundName || 'الجولة';

  // Update scores bar
  renderScoresBar(data);

  // Detect round change
  if (round !== lastRound) {
    lastRound = round;
    // Sync slices (simplified - use base slices for display)
    currentSlices = JSON.parse(JSON.stringify(WHEEL_SLICES));
    wheelAngle = 0;
    drawPlayerWheel();
  }

  // Determine what to show
  if (phase === 'final') {
    showView('finalView');
    renderFinal(data);
    return;
  }

  // End of round transition
  if (phase === 'endRound') {
    showView('endRoundView');
    const myData = data.players?.[myPlayerIndex];
    if (myData) {
      document.getElementById('myRoundScore').textContent = myData.roundPts?.[round] || 0;
      document.getElementById('myTotalScore').textContent = myData.totalPts || 0;
    }
    return;
  }

  if (roundType === 'fishing') {
    showView('fishingView');
    renderFishingPlayer(data);
    return;
  }

  // Wheel rounds - show wheel + word
  const isMyTurn = data.currentTurn === myPlayerIndex;

  // Show word if available
  if (data.word && data.word.length > 0) {
    showView('wordViewPlayer');
    renderWordPlayer(data);

    // Show spin gesture overlay if it's my turn and phase is spinning
    if (isMyTurn && phase === 'spinning') {
      enableSpinForPlayer();
    } else {
      disableSpinForPlayer();
    }

    // Show category
    document.getElementById('categoryPill').textContent = data.category || 'الفئة';

  } else {
    showView('wheelView');
    renderWheelView(data, isMyTurn, phase);
  }
}

function showView(viewId) {
  ['wheelView','wordViewPlayer','fishingView','endRoundView','finalView'].forEach(id => {
    document.getElementById(id).style.display = id === viewId ? 'flex' : 'none';
  });
}

function renderWheelView(data, isMyTurn, phase) {
  drawPlayerWheel();
  if (isMyTurn && phase === 'spinning') {
    enableSpinForPlayer();
  } else {
    disableSpinForPlayer();
    document.getElementById('spinHint').textContent =
      isMyTurn ? 'دورك! ألف العجلة' : `دور ${data.players?.[data.currentTurn]?.name || ''}`;
  }
}

function enableSpinForPlayer() {
  canSpin = true;
  document.getElementById('spinGesture').style.display = 'block';
  document.getElementById('spinHint').textContent = '↕ اسحب لأعلى لتلف العجلة!';
  showToast('دورك! ألف العجلة 🎡');
}

function disableSpinForPlayer() {
  canSpin = false;
  document.getElementById('spinGesture').style.display = 'none';
}

function renderWordPlayer(data) {
  const wordGrid = document.getElementById('wordGridPlayer');
  wordGrid.innerHTML = '';

  if (!data.word || !Array.isArray(data.word)) return;

  // Group consecutive non-space letters into word groups
  let currentWordDiv = null;

  data.word.forEach((cell) => {
    if (cell.type === 'space') {
      currentWordDiv = null;
      const sp = document.createElement('div');
      sp.className = 'wletter space';
      wordGrid.appendChild(sp);
      return;
    }

    if (!currentWordDiv) {
      currentWordDiv = document.createElement('div');
      currentWordDiv.style.cssText = 'display:flex;gap:3px;direction:rtl;';
      wordGrid.appendChild(currentWordDiv);
    }

    const cell_el = document.createElement('div');
    cell_el.className = 'wletter ' + (cell.revealed ? 'revealed' : 'hidden');

    if (cell.revealed && cell.char) {
      cell_el.textContent = cell.char;
    } else if (!cell.revealed) {
      cell_el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3" fill="none" stroke="rgba(0,229,255,0.3)" stroke-width="2"/></svg>';
    }

    currentWordDiv.appendChild(cell_el);
  });

  // Show spin overlay on top of word if it's my turn
  // Actually we show it as an overlay on the whole screen
  // Check if player's turn and spinning phase
  if (lastGameState && lastGameState.currentTurn === myPlayerIndex && lastGameState.phase === 'spinning') {
    enableSpinForPlayer();
  }
}

function renderFishingPlayer(data) {
  document.getElementById('fishingTitleP').textContent =
    data.roundName || '🎣 جولة الصيد';

  if (!data.word || !Array.isArray(data.word)) return;
  let display = '';
  data.word.forEach(cell => {
    if (cell.type === 'space') display += '   ';
    else if (cell.revealed) display += cell.char + ' ';
    else display += '_ ';
  });
  document.getElementById('fishingWordP').textContent = display;
}

function renderScoresBar(data) {
  const panel = document.getElementById('scoresPanel');
  panel.innerHTML = '';
  if (!data.players) return;
  const round = data.round || 0;
  data.players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'score-mini' + (i === data.currentTurn ? ' active' : '');
    card.innerHTML = `
      <div class="sm-name">${p.name}</div>
      <div class="sm-round">${p.roundPts?.[round] || 0}</div>
      <div class="sm-total">${p.totalPts || 0} 🏅</div>
    `;
    panel.appendChild(card);
  });
}

function renderFinal(data) {
  if (!data.players) return;
  const sorted = [...data.players].sort((a,b) => (b.totalPts||0) - (a.totalPts||0));
  const ranks = ['🥇','🥈','🥉'];
  const ranking = document.getElementById('finalRanking');
  ranking.innerHTML = '';
  sorted.forEach((p,i) => {
    const div = document.createElement('div');
    div.style.cssText = 'margin:8px 0;font-size:1.1rem;font-weight:700;';
    const isMe = p.name === myName;
    div.innerHTML = `<span style="color:${isMe?'var(--yellow)':'var(--text)'}">${ranks[i]} ${p.name}: ${p.totalPts || 0} نقطة</span>`;
    ranking.appendChild(div);
  });
}

// ==================== TOAST ====================
let toastTimeout;
function showToast(msg) {
  const toast = document.getElementById('statusToast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
}

// Init
drawPlayerWheel();
</script>
</body>
</html>
