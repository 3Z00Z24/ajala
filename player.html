<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>العجلة - اللاعب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Changa:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050510;--panel:#0d0d2b;--panel2:#13133a;--border:#1e1e4a;--cyan:#00e5ff;--green:#00ff88;--yellow:#ffea00;--orange:#ff6d00;--text:#fff;--muted:#8888aa;--red:#ff1744;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Changa','Cairo',sans-serif;background:var(--bg);color:var(--text);}

/* NAME ENTRY */
#nameScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:18px;}
.logo-p{text-align:center;margin-bottom:4px;}
.logo-p h1{font-size:2.2rem;font-weight:900;font-style:italic;transform:rotate(-4deg);display:inline-block;background:linear-gradient(135deg,var(--cyan),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;}
.name-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:330px;}
.name-card h2{color:var(--cyan);text-align:center;font-size:1.1rem;margin-bottom:16px;}
.name-card input{width:100%;background:var(--panel2);border:2px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:1.1rem;text-align:center;margin-bottom:14px;display:block;}
.name-card input:focus{outline:none;border-color:var(--cyan);}
.btn-join{width:100%;background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;border:none;border-radius:12px;padding:14px;font-size:1.1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}

/* WAITING */
#waitScreen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:16px;text-align:center;}
.wait-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:330px;}
.wait-icon{font-size:3rem;margin-bottom:10px;}
.wait-title{font-size:1.2rem;font-weight:700;color:var(--cyan);margin-bottom:8px;}
.wait-sub{color:var(--muted);font-size:0.88rem;}
.wait-name-badge{background:rgba(0,229,255,0.1);border:1px solid var(--cyan);border-radius:10px;padding:10px 20px;font-size:1.1rem;font-weight:700;color:var(--cyan);margin:12px 0;}

/* REJECTED */
#rejScreen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;}

/* PLAYER SCREEN */
#playerScreen{display:none;flex-direction:column;height:100vh;}
.pheader{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.my-name-h{font-size:0.9rem;font-weight:700;color:var(--cyan);}
.rnd-badge{font-size:0.7rem;color:var(--muted);background:var(--panel2);padding:3px 9px;border-radius:18px;}

.pcontent{flex:1;overflow:hidden;position:relative;}

/* Views */
.view{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:12px;overflow-y:auto;}
.view.active{display:flex;}

/* Wheel view */
#wheelView{gap:10px;}
.wptr-p{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:22px solid var(--yellow);z-index:10;filter:drop-shadow(0 2px 6px rgba(255,234,0,0.9));}
.wwrap-p{position:relative;flex-shrink:0;}
.spin-hint{font-size:0.82rem;color:var(--muted);text-align:center;}
.spin-btn{background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;border:none;border-radius:50px;padding:15px 42px;font-size:1.15rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,255,0.4);animation:pulse 1.6s ease-in-out infinite;display:none;}
@keyframes pulse{0%,100%{box-shadow:0 4px 18px rgba(0,229,255,0.4);}50%{box-shadow:0 4px 32px rgba(0,229,255,0.85);}}
@keyframes pulseGreen{0%,100%{box-shadow:0 4px 18px rgba(0,200,83,0.4);}50%{box-shadow:0 6px 36px rgba(0,200,83,0.9);}}
.spin-result-p{font-size:1.2rem;font-weight:900;color:var(--yellow);text-align:center;min-height:28px;}

/* Word view */
#wordView{gap:10px;}
.cat-p{background:rgba(0,229,255,0.1);border:1px solid var(--cyan);color:var(--cyan);font-size:0.75rem;padding:3px 14px;border-radius:18px;}

/* GRID WORD DISPLAY */
.word-grid-p{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;direction:rtl;padding:4px;}
.wg-cell-p{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;}
.wg-cell-p.letter-hidden{background:#0a1628;border:2px solid #1a3a6a;}
.wg-cell-p.letter-revealed{background:#0a1628;border:2px solid #1a3a6a;}
.wg-cell-p.letter-flash{background:#7dd3fc;border:2px solid #38bdf8;animation:cellFlashP 2s ease;}
.wg-cell-p.space-cell-p{background:#fff;border:2px solid #ddd;border-radius:9px;}
.wg-char-p{font-size:1.1rem;font-weight:800;color:#fff;font-family:'Changa','Cairo',sans-serif;}
.wg-logo-p{width:20px;height:20px;opacity:0.5;}
@keyframes cellFlashP{0%{background:#7dd3fc;}60%{background:#38bdf8;}100%{background:#0a1628;border-color:#1a3a6a;}}

/* PERMANENT SCORE BAR - always visible at bottom */
#myScoreBar{flex-shrink:0;padding:6px 12px 10px;background:var(--bg);}
.score-permanent{display:flex;align-items:center;justify-content:center;gap:0;background:var(--panel2);border:2.5px solid var(--cyan);border-radius:16px;padding:8px 0;box-shadow:0 0 18px rgba(0,229,255,0.18);}
.score-rnd-block,.score-tot-block{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 10px;}
.score-lbl{font-size:0.62rem;color:var(--muted);font-family:'Changa','Cairo',sans-serif;font-weight:600;letter-spacing:0.5px;}
.score-rnd-val{font-size:3rem;font-weight:800;color:var(--yellow);line-height:1;font-family:'Changa','Cairo',sans-serif;}
.score-tot-val{font-size:1.6rem;font-weight:800;color:var(--green);line-height:1;font-family:'Changa','Cairo',sans-serif;}
.score-divider{width:2px;height:52px;background:rgba(0,229,255,0.3);border-radius:2px;flex-shrink:0;}

/* Fishing view - LARGE */
#fishView{gap:12px;text-align:center;}
.fish-lbl-p{font-size:1rem;color:var(--green);font-weight:700;}
.fish-word-big{font-size:2.8rem;font-weight:900;color:var(--yellow);letter-spacing:6px;direction:rtl;line-height:1.2;word-break:break-all;padding:10px;}

/* End round */
#endView{gap:16px;text-align:center;}
.big-rnd-p{font-size:3.5rem;font-weight:900;color:var(--yellow);line-height:1;}
.big-tot-p{font-size:2rem;font-weight:700;color:var(--green);}
.lbl-p{font-size:0.88rem;color:var(--muted);}

/* Final */
#finalView{gap:12px;text-align:center;padding:16px;}

/* Scores bottom bar */
.scores-bot{background:var(--panel);border-top:1px solid var(--border);padding:8px 10px;display:flex;gap:6px;flex-shrink:0;}
.smini{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:6px;text-align:center;transition:all 0.3s;}
.smini.active{border-color:var(--cyan);background:rgba(0,229,255,0.07);}
.sm-n{font-size:0.62rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sm-r{font-size:0.95rem;font-weight:900;color:var(--yellow);}
.sm-t{font-size:0.62rem;color:var(--green);}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:10px 20px;font-size:0.88rem;font-weight:700;opacity:0;transition:all 0.35s;z-index:100;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- NAME ENTRY -->
<div id="nameScreen">
  <div class="logo-p">
    <svg width="70" height="70" viewBox="0 0 120 120" style="display:block;margin:0 auto 6px">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#1e1e4a" stroke-width="3"/>
      <path d="M60,5 A55,55 0 0,1 115,60" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M115,60 A55,55 0 0,1 60,115" fill="none" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
      <path d="M60,115 A55,55 0 0,1 5,60" fill="none" stroke="#ffea00" stroke-width="8" stroke-linecap="round"/>
      <path d="M5,60 A55,55 0 0,1 60,5" fill="none" stroke="#ff6d00" stroke-width="8" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="16" fill="#050510" stroke="#00e5ff" stroke-width="2"/>
      <text x="60" y="65" text-anchor="middle" font-size="10" font-weight="900" font-family="Cairo" fill="white" transform="rotate(-5,60,60)">عجلة</text>
    </svg>
    <h1>العجلة</h1>
  </div>
  <div class="name-card">
    <h2>أدخل اسمك للانضمام</h2>
    <input type="text" id="nameInput" placeholder="اسمك هنا" maxlength="20" autocomplete="off"/>
    <button class="btn-join" onclick="joinGame()">انضمام 🎮</button>

</div>

<!-- WAITING -->
<div id="waitScreen">
  <div class="wait-card">
    <div class="wait-icon">⏳</div>
    <div class="wait-title">طلبك أُرسل!</div>
    <div class="wait-name-badge" id="waitNameBadge">اسمك</div>
    <div class="wait-sub">انتظر موافقة المقدم...</div>
    <div id="waitStatus" style="margin-top:12px;font-size:0.82rem;color:var(--muted)"></div>
  </div>
</div>

<!-- REJECTED -->
<div id="rejScreen">
  <div class="wait-card" style="border-color:var(--red)">
    <div style="font-size:2.5rem">❌</div>
    <div style="font-size:1.1rem;font-weight:700;color:var(--red);margin:10px 0">لم يتم القبول</div>
    <div style="color:var(--muted);margin-bottom:16px;font-size:0.88rem">لم يوافق المقدم على انضمامك</div>
    <button class="btn-join" onclick="tryAgain()">حاول مرة أخرى</button>
  </div>
</div>

<!-- PLAYER SCREEN -->
<div id="playerScreen">
  <div class="pheader">
    <span class="my-name-h" id="myNameEl">اللاعب</span>
    <span class="rnd-badge" id="rndBadge">الجولة ١</span>
  </div>
  <div class="pcontent">
    <!-- Wheel -->
    <div class="view" id="wheelView">
      <div class="wwrap-p">
        <div class="wptr-p"></div>
        <canvas id="pc"></canvas>
      </div>
      <div class="spin-hint" id="spinHint">انتظر دورك...</div>
      <button class="spin-btn" id="spinBtn" onclick="triggerSpin()">🎡 الف العجلة!</button>
      <div class="spin-result-p" id="spinResP"></div>
    </div>

    <!-- Word + wheel on same screen -->
    <div class="view" id="wordView">
      <div class="wwrap-p" style="margin-bottom:8px">
        <div class="wptr-p"></div>
        <canvas id="pc2"></canvas>
      </div>
      <span class="cat-p" id="catP">الفئة</span>
      <div id="wdispP" style="width:100%;"></div>
      <button class="spin-btn" id="spinBtn2" onclick="triggerSpin()">🎡 الف العجلة!</button>
      <div class="spin-result-p" id="spinResP2"></div>
      <div class="spin-hint" id="spinHint2"></div>
    </div>

    <!-- Fishing -->
    <div class="view" id="fishView">
      <div class="fish-lbl-p" id="fishLblP">🎣 جولة الصيد</div>
      <div id="fishGridP" style="width:100%;padding:6px;"></div>
      <div id="fishBuzzArea" style="margin-top:8px;text-align:center;">
        <button id="fishBuzzBtn" onclick="pressFishBuzz()" style="background:linear-gradient(135deg,#00c853,#1b5e20);color:#fff;border:none;border-radius:50px;padding:18px 44px;font-size:1.25rem;font-weight:800;font-family:Changa,Cairo,sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,83,0.5);animation:pulseGreen 1.2s ease-in-out infinite;display:none;">
          🙋 أعرف الجواب!
        </button>
        <div id="fishBuzzStatus" style="color:var(--muted);font-size:0.8rem;margin-top:6px;"></div>
      </div>
    </div>

    <!-- End round -->
    <div class="view" id="endView">
      <div style="font-size:1rem;color:var(--cyan);font-weight:700;text-align:center">🎉 انتهت الجولة!</div>
      <div style="font-size:0.78rem;color:var(--muted);text-align:center;margin-top:2px" id="endRndName"></div>
      <div style="margin:8px 0 2px;font-size:0.72rem;color:var(--muted);text-align:center">نقاطك في هذه الجولة</div>
      <div class="big-rnd-p" id="myRndP">0</div>
      <div style="margin:4px 0 2px;font-size:0.72rem;color:var(--muted);text-align:center">مجموع نقاطك الكلي</div>
      <div class="big-tot-p" id="myTotP">0</div>
    </div>

    <!-- Final -->
    <div class="view" id="finalView">
      <div style="font-size:1.4rem;font-weight:900;color:var(--yellow)">🏆 انتهت اللعبة!</div>
      <div id="finalRankEl" style="margin-top:12px;width:100%;max-width:300px"></div>
    </div>
  </div>

  <div id="myScoreBar">
    <div class="score-permanent">
      <div class="score-rnd-block">
        <div class="score-lbl">نقاط الجولة</div>
        <div class="score-rnd-val" id="scoreRndVal">0</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-tot-block">
        <div class="score-lbl">المجموع</div>
        <div class="score-tot-val" id="scoreTotVal">0</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyASPPu2V3ZPeJOMTYK_1A-1LxJz-CFFCmc",authDomain:"al-ajala.firebaseapp.com",databaseURL:"https://al-ajala-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"al-ajala",storageBucket:"al-ajala.firebasestorage.app",messagingSenderId:"634499303447",appId:"1:634499303447:web:4a6a6841db4652ab083452"};
const app=initializeApp(FB);
const db=getDatabase(app);

let myName='',myIdx=-1,myJoinKey='',isApproved=false;
let wAng=0,wAng2=0,spinning=false,canSpin=false;
let lastGameTs=0,lastRound=-1;
let currentSlices=null; // synced from host

// ===== SAME COLORS AS HOST =====
const COLOR_MAP={
  '100':'#1565C0','35':'#2E7D32','200':'#6A1B9A','25':'#00838F',
  '45':'#2E7D32','15':'#AD1457','50':'#2E7D32','40':'#00838F',
  '20':'#AD1457','30':'#1565C0',
  'راحت عليك':'#37474F','إفلاس':'#B71C1C',
  'عطيناك ثنتين':'#4527A0','وسيلة مساعدة':'#00695C','تحدي':'#BF360C'
};
const COLORS_CYCLE=['#1565C0','#2E7D32','#6A1B9A','#00838F','#AD1457','#E65100'];
function colorFor(lbl,idx){return COLOR_MAP[lbl]||(COLORS_CYCLE[idx%COLORS_CYCLE.length]);}

// ===== HIGH-DPI CANVAS SETUP =====
function setupHiDPI(canvas,size){
  const dpr=window.devicePixelRatio||1;
  canvas.width=size*dpr;canvas.height=size*dpr;
  canvas.style.width=size+'px';canvas.style.height=size+'px';
  const c=canvas.getContext('2d');c.scale(dpr,dpr);return c;
}

const canvas=document.getElementById('pc');
const canvas2=document.getElementById('pc2');
let hCtx1,hCtx2,canvasSize;

function initCanvases(){
  const vw=window.innerWidth;
  canvasSize=Math.min(vw-40,220);
  hCtx1=setupHiDPI(canvas,canvasSize);
  hCtx2=setupHiDPI(canvas2,canvasSize);
  drawW();drawW2();
}
initCanvases();
window.addEventListener('resize',initCanvases);

function drawWheelOnCtx(ctx,size,slices,ang){
  const W=size,cx=W/2,cy=W/2,r=W/2-3;
  ctx.clearRect(0,0,W,W);
  const n=slices.length,arc=2*Math.PI/n;
  for(let i=0;i<n;i++){
    const s=ang+i*arc-Math.PI/2,e=s+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=colorFor(slices[i].l,i);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+arc/2);ctx.textAlign='right';
    ctx.fillStyle='#FFFFFF';ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=3;
    const lbl=slices[i].l;
    let fs=lbl.length>5?7:lbl.length>3?8.5:11;
    ctx.font=`800 ${fs}px 'Changa','Cairo',sans-serif`;
    ctx.fillText(lbl,r-5,fs*0.38);
    ctx.restore();
  }
  const hr=W*0.1;
  ctx.beginPath();ctx.arc(cx,cy,hr,0,2*Math.PI);
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,hr);
  grad.addColorStop(0,'#1a1a3e');grad.addColorStop(1,'#050510');
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`800 ${Math.floor(hr*0.6)}px 'Changa','Cairo',sans-serif`;
  ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=2;
  ctx.fillText('عجلة',cx,cy+hr*0.22);ctx.shadowBlur=0;
}

function getSlices(){
  if(currentSlices&&currentSlices.length>0)return currentSlices;
  // fallback default order
  return [
    {l:'100'},{l:'35'},{l:'200'},{l:'25'},{l:'35'},{l:'45'},{l:'15'},{l:'100'},
    {l:'20'},{l:'50'},{l:'25'},{l:'40'},{l:'20'},{l:'45'},{l:'30'},{l:'50'},
    {l:'راحت عليك'},{l:'راحت عليك'},{l:'إفلاس'},{l:'عطيناك ثنتين'},
    {l:'وسيلة مساعدة'},{l:'تحدي'},{l:'تحدي'}
  ];
}
function drawW(){if(hCtx1)drawWheelOnCtx(hCtx1,canvasSize,getSlices(),wAng);}
function drawW2(){if(hCtx2)drawWheelOnCtx(hCtx2,canvasSize,getSlices(),wAng2);}

// ===== LOGO SVG =====
const LOGO_SVG_P=`<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="60" r="52" fill="none" stroke="#1a5fa8" stroke-width="6"/><path d="M60,8 A52,52 0 0,1 112,60" fill="none" stroke="#1a5fa8" stroke-width="10" stroke-linecap="round"/><path d="M112,60 A52,52 0 0,1 60,112" fill="none" stroke="#1565a0" stroke-width="10" stroke-linecap="round"/><path d="M60,112 A52,52 0 0,1 8,60" fill="none" stroke="#1a5fa8" stroke-width="10" stroke-linecap="round"/><path d="M8,60 A52,52 0 0,1 60,8" fill="none" stroke="#1565a0" stroke-width="10" stroke-linecap="round"/><circle cx="60" cy="60" r="15" fill="none" stroke="#1a5fa8" stroke-width="4"/><text x="60" y="65" text-anchor="middle" font-size="9" font-weight="900" font-family="Changa,Cairo" fill="#1a5fa8">عجلة</text></svg>`;

// ===== WORD GRID RENDER =====
function renderWordGrid(wd,containerId){
  const el=document.getElementById(containerId);if(!el)return;el.innerHTML='';
  if(!wd||!Array.isArray(wd))return;
  const row=document.createElement('div');row.className='word-grid-p';
  wd.forEach(cell=>{
    const div=document.createElement('div');
    if(cell.t==='s'){
      div.className='wg-cell-p space-cell-p';
      div.innerHTML=`<div class="wg-logo-p">${LOGO_SVG_P}</div>`;
    } else {
      div.className='wg-cell-p '+(cell.r?'letter-revealed':'letter-hidden');
      if(cell.r){const s=document.createElement('span');s.className='wg-char-p';s.textContent=cell.ch;div.appendChild(s);}
      else{div.innerHTML=`<div class="wg-logo-p">${LOGO_SVG_P}</div>`;}
    }
    row.appendChild(div);
  });
  el.appendChild(row);
}

// ===== JOIN =====
window.joinGame=function(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){alert('أدخل اسمك');return;}
  myName=name;
  document.getElementById('waitNameBadge').textContent=name;
  document.getElementById('nameScreen').style.display='none';
  document.getElementById('waitScreen').style.display='flex';
  const joinRef=push(ref(db,'joinReqs'));
  myJoinKey=joinRef.key;
  set(joinRef,{name,ts:Date.now()});
  watchForApproval();
};

window.tryAgain=function(){
  document.getElementById('rejScreen').style.display='none';
  document.getElementById('nameScreen').style.display='flex';
  myName='';myJoinKey='';isApproved=false;
};

function watchForApproval(){
  onValue(ref(db,'game'),snap=>{
    const d=snap.val();
    if(!d)return;
    if(isApproved){handleGameUpdate(d);return;}
    if(d.players&&Array.isArray(d.players)){
      const idx=d.players.findIndex(p=>p.name===myName);
      if(idx>=0){
        isApproved=true;myIdx=idx;
        document.getElementById('waitScreen').style.display='none';
        document.getElementById('playerScreen').style.display='flex';
        document.getElementById('myNameEl').textContent=myName;
        handleGameUpdate(d);return;
      }
    }
    if(d.phase==='lobby')document.getElementById('waitStatus').textContent='المقدم يراجع طلبك...';
  });
}

// ===== GAME UPDATE =====
function handleGameUpdate(d){
  if(!d||!isApproved)return;
  if(d.ts===lastGameTs)return;
  lastGameTs=d.ts;

  // تعريف rType أولاً قبل أي استخدام
  const rType=d.rType||'wheel';
  window._lastPhase=d.phase;
  window._lastRType=rType;

  // Sync slices from host
  if(d.sliceOrder&&Array.isArray(d.sliceOrder)){
    currentSlices=d.sliceOrder.map(l=>({l}));
  }

  document.getElementById('rndBadge').textContent=d.rName||'الجولة';
  renderMyScore(d);

  // Round changed - reset angle
  if(d.round!==lastRound){lastRound=d.round;wAng=0;wAng2=0;}

  // Sync wheel angle from host when not spinning locally
  if(!spinning&&d.wheelAngle!==undefined){wAng=d.wheelAngle;wAng2=d.wheelAngle;}
  drawW();drawW2();

  if(d.phase==='final'){showView('finalView');renderFinal(d);return;}

  // Round end screen
  if(d.phase==='roundEnd'){
    showView('endView');
    const p=d.players?.[myIdx];
    const rnd=d.round||0;
    const rpts=getRpts(p,rnd);
    document.getElementById('endRndName').textContent=d.rName||'';
    document.getElementById('myRndP').textContent=rpts;
    document.getElementById('myTotP').textContent=p?.total||0;
    return;
  }

  const isMyTurn=d.turn===myIdx;

  if(rType==='fish'||d.phase==='fish'||d.phase==='fish_buzz'){
    showView('fishView');
    document.getElementById('fishLblP').textContent=d.rName||'🎣 جولة الصيد';
    // Render fish grid
    const el=document.getElementById('fishGridP');el.innerHTML='';
    if(d.wd&&Array.isArray(d.wd)){
      const row=document.createElement('div');row.className='word-grid-p';
      d.wd.forEach(cell=>{
        const div=document.createElement('div');
        if(cell.t==='s'){div.className='wg-cell-p space-cell-p';div.innerHTML=`<div class="wg-logo-p">${LOGO_SVG_P}</div>`;}
        else{
          div.className='wg-cell-p '+(cell.r?'letter-revealed':'letter-hidden');
          if(cell.r){const s=document.createElement('span');s.className='wg-char-p';s.textContent=cell.ch;div.appendChild(s);}
          else div.innerHTML=`<div class="wg-logo-p">${LOGO_SVG_P}</div>`;
        }
        row.appendChild(div);
      });
      el.appendChild(row);
    }
    // Buzzer button logic
    const used=d.fishUsedPlayers&&Array.isArray(d.fishUsedPlayers)?d.fishUsedPlayers:[];
    const isBuzzing=d.fishBuzzerPlayer>=0;
    const myUsed=used.includes(myIdx);
    const btn=document.getElementById('fishBuzzBtn');
    const statusEl=document.getElementById('fishBuzzStatus');
    if(d.phase==='fish_buzz'){
      btn.style.display='none';
      if(d.fishBuzzerPlayer===myIdx)statusEl.textContent='⏳ انتظر... يتم التحقق من إجابتك';
      else statusEl.textContent=`⏸ ${d.players?.[d.fishBuzzerPlayer]?.name||''} يجاوب...`;
    } else if(myUsed){
      btn.style.display='none';
      statusEl.textContent='استخدمت محاولتك في هذه الجولة';
    } else if(!isBuzzing){
      btn.style.display='inline-block';
      btn.disabled=false;
      statusEl.textContent='كن أول من يجاوب!';
    }
    return;
  }

  // Wheel rounds
  if(d.wd&&d.wd.length>0&&d.cat){
    showView('wordView');
    document.getElementById('catP').textContent=d.cat||'الفئة';
    renderWordGrid(d.wd,'wdispP');
    // في الجولة الخاصة لا يظهر زر اللف عند اللاعبين
    const isSpecial=rType==='special'||d.phase==='special_guess';
    const canSpinNow=isMyTurn&&d.phase!=='guess'&&d.phase!=='special_guess'&&!isSpecial;
    if(canSpinNow)enableSpin2(true);
    else{
      enableSpin2(false);
      let hint='';
      if(isSpecial)hint=`الجولة الخاصة - دور: ${d.players?.[d.turn]?.name||''}`;
      else if(d.phase==='guess')hint='انتظر تخمين الحرف...';
      else hint=isMyTurn?'':(`دور ${d.players?.[d.turn]?.name||''}`);
      document.getElementById('spinHint2').textContent=hint;
    }
    document.getElementById('spinResP2').textContent=d.sLabel?`${d.sLabel} ${d.specialVal?'→ قيمة الحرف: '+d.specialVal:''}`:'';
  } else {
    showView('wheelView');
    const isSpecial=rType==='special';
    const canSpinNow=isMyTurn&&d.phase!=='guess'&&!isSpecial;
    if(canSpinNow)enableSpin1(true);
    else{
      enableSpin1(false);
      let hint='';
      if(isSpecial)hint='الجولة الخاصة - الهوست يلف العجلة';
      else if(d.phase==='guess')hint='انتظر تخمين الحرف...';
      else hint=isMyTurn?'':(`دور ${d.players?.[d.turn]?.name||''}`);
      document.getElementById('spinHint').textContent=hint;
    }
    document.getElementById('spinResP').textContent=d.sLabel||'';
  }
}

// قراءة نقاط جولة - يدعم طريقتي الإرسال (r0-r4 أو rpts array)
function getRpts(p, rnd){
  if(!p)return 0;
  const key='r'+rnd;
  if(p[key]!==undefined)return p[key];
  if(Array.isArray(p.rpts))return p.rpts[rnd]||0;
  if(p.rpts&&typeof p.rpts==='object')return Object.values(p.rpts)[rnd]||0;
  return 0;
}

function renderMyScore(d){
  if(!d.players||myIdx<0||myIdx>=d.players.length)return;
  const p=d.players[myIdx];
  const rnd=d.round||0;
  const rndEl=document.getElementById('scoreRndVal');
  const totEl=document.getElementById('scoreTotVal');
  if(rndEl)rndEl.textContent=getRpts(p,rnd);
  if(totEl)totEl.textContent=(p.total||0)+' 🏅';
  // وسيلة المساعدة
  const badge=document.getElementById('helperBadge');
  if(badge)badge.style.display=p.helper?'block':'none';
}

function enableSpin1(on){
  canSpin=on;
  document.getElementById('spinBtn').style.display=on?'inline-block':'none';
  document.getElementById('spinHint').textContent=on?'اضغط لتلف العجلة!':'انتظر دورك...';
  if(on)showToast('دورك! 🎡');
}
function enableSpin2(on){
  canSpin=on;
  document.getElementById('spinBtn2').style.display=on?'inline-block':'none';
  if(on)showToast('دورك! 🎡');
}

// ===== SPIN SYNC من الهوست =====
onValue(ref(db,'spinSync'),snap=>{
  const d=snap.val();if(!d)return;
  if(d.ts<=(window._lastSpinTs||0))return;
  window._lastSpinTs=d.ts;
  // لا تشغّل لو الهوست هو من طلب (التحرك يبدأ من spinSync مباشرة)
  animateSpin(d.startAngle,d.totalAngle,d.duration);
});

function animateSpin(startAng,totalAng,dur){
  if(spinning)return;
  spinning=true;
  canSpin=false;
  document.getElementById('spinBtn').style.display='none';
  document.getElementById('spinBtn2').style.display='none';
  document.getElementById('spinHint').textContent='🎡 العجلة تدور...';
  document.getElementById('spinHint2').textContent='🎡 العجلة تدور...';
  const t0=performance.now();
  function go(now){
    const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,4);
    wAng=startAng+totalAng*e;wAng2=wAng;drawW();drawW2();
    if(p<1)requestAnimationFrame(go);else spinning=false;
  }
  requestAnimationFrame(go);
}

window.triggerSpin=function(){
  if(!canSpin||spinning)return;
  if(window._lastPhase==='guess'||window._lastPhase==='special_guess'){showToast('انتظر تخمين الحرف!');return;}
  if(window._lastRType==='special'){showToast('الجولة الخاصة: الهوست يلف العجلة');return;}
  set(ref(db,'spinReq'),{turn:myIdx,ts:Date.now()});
};

// ===== FISH BUZZER =====
let fishBuzzTimer=null;
window.pressFishBuzz=function(){
  const btn=document.getElementById('fishBuzzBtn');
  const statusEl=document.getElementById('fishBuzzStatus');
  btn.disabled=true;
  btn.style.animation='none';
  btn.style.opacity='0.5';
  // أرسل للهوست
  set(ref(db,'fishBuzz'),{playerIdx:myIdx,ts:Date.now()});
  statusEl.textContent='⏳ انتظر... (3 ثواني للإجابة)';
  let count=3;
  clearInterval(fishBuzzTimer);
  fishBuzzTimer=setInterval(()=>{
    count--;
    statusEl.textContent=`⏳ ${count} ثانية...`;
    if(count<=0){
      clearInterval(fishBuzzTimer);
      statusEl.textContent='انتهى وقتك!';
    }
  },1000);
};

function renderFinal(d){
  if(!d.players)return;
  const s=[...d.players].sort((a,b)=>(b.total||0)-(a.total||0));
  const rk=['🥇','🥈','🥉'],el=document.getElementById('finalRankEl');el.innerHTML='';
  s.forEach((p,i)=>{
    const div=document.createElement('div');
    div.style.cssText='margin:8px 0;font-size:1.1rem;font-weight:700;text-align:center;font-family:Changa,Cairo,sans-serif;';
    div.innerHTML=`<span style="color:${p.name===myName?'var(--yellow)':'var(--text)'}">${rk[i]} ${p.name}: ${p.total||0} نقطة</span>`;
    el.appendChild(div);
  });
}

function showView(id){
  ['wheelView','wordView','fishView','endView','finalView'].forEach(v=>{
    document.getElementById(v).classList.toggle('active',v===id);
  });
}

let toastT;
function showToast(msg){
  const t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

drawW();drawW2();
</script>
