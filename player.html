<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>العجلة - اللاعب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Changa:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050510;--panel:#0d0d2b;--panel2:#13133a;--border:#1e1e4a;
  --cyan:#00e5ff;--green:#00ff88;--yellow:#ffea00;--orange:#ff6d00;
  --text:#fff;--muted:#8888aa;--red:#ff1744;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Changa','Cairo',sans-serif;background:var(--bg);color:var(--text);}

#nameScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:18px;}
.logo-p h1{font-size:2.2rem;font-weight:900;font-style:italic;transform:rotate(-4deg);display:inline-block;background:linear-gradient(135deg,var(--cyan),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;}
.name-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:330px;}
.name-card h2{color:var(--cyan);text-align:center;font-size:1.1rem;margin-bottom:16px;}
.name-card input{width:100%;background:var(--panel2);border:2px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:1.1rem;text-align:center;margin-bottom:14px;display:block;}
.name-card input:focus{outline:none;border-color:var(--cyan);}
.btn-join{width:100%;background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;border:none;border-radius:12px;padding:14px;font-size:1.1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}

#waitScreen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:16px;text-align:center;}
.wait-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:330px;}
.wait-name-badge{background:rgba(0,229,255,0.1);border:1px solid var(--cyan);border-radius:10px;padding:10px 20px;font-size:1.1rem;font-weight:700;color:var(--cyan);margin:12px 0;}

#rejScreen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;}

/* PLAYER SCREEN */
#playerScreen{display:none;flex-direction:column;height:100vh;}
.pheader{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.my-name-h{font-size:0.9rem;font-weight:700;color:var(--cyan);}
.rnd-badge{font-size:0.7rem;color:var(--muted);background:var(--panel2);padding:3px 9px;border-radius:18px;}

/* SCORE BAR */
#myScoreBar{flex-shrink:0;padding:5px 10px 4px;}
.score-perm{display:flex;align-items:center;background:var(--panel2);border:2.5px solid var(--cyan);border-radius:14px;padding:5px 0;box-shadow:0 0 14px rgba(0,229,255,0.18);}
.sc-rnd,.sc-tot{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 8px;}
.sc-lbl{font-size:0.58rem;color:var(--muted);font-weight:600;}
.sc-rnd-v{font-size:2.4rem;font-weight:800;color:var(--yellow);line-height:1.1;}
.sc-tot-v{font-size:1.3rem;font-weight:800;color:var(--green);line-height:1.1;}
.sc-div{width:2px;height:44px;background:rgba(0,229,255,0.25);border-radius:2px;flex-shrink:0;}
.helper-bar{background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:10px;padding:5px 12px;margin:4px 0 0;text-align:center;font-size:0.78rem;font-weight:800;color:#000;display:none;animation:hglow 1.8s ease-in-out infinite;}
@keyframes hglow{0%,100%{box-shadow:0 0 10px rgba(251,191,36,0.4);}50%{box-shadow:0 0 24px rgba(251,191,36,0.9);}}

/* CONTENT */
.pcontent{flex:1;overflow:hidden;position:relative;min-height:0;}
.view{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:10px;overflow-y:auto;gap:8px;}
.view.active{display:flex;}

/* WHEEL */
.wwrap-p{position:relative;flex-shrink:0;}
.wptr-p{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid var(--yellow);z-index:10;filter:drop-shadow(0 2px 6px rgba(255,234,0,0.9));}
.spin-hint{font-size:0.82rem;color:var(--muted);text-align:center;}
.spin-btn{background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;border:none;border-radius:50px;padding:14px 40px;font-size:1.1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;display:none;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 4px 18px rgba(0,229,255,0.4);}50%{box-shadow:0 4px 32px rgba(0,229,255,0.9);}}
@keyframes pulseGreen{0%,100%{box-shadow:0 4px 18px rgba(0,200,83,0.4);}50%{box-shadow:0 6px 36px rgba(0,200,83,0.9);}}
.spin-res-p{font-size:1.1rem;font-weight:900;color:var(--yellow);text-align:center;min-height:24px;}

/* WORD */
.cat-p{background:rgba(0,229,255,0.1);border:1px solid var(--cyan);color:var(--cyan);font-size:0.75rem;padding:3px 14px;border-radius:18px;}
.word-grid-p{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;direction:rtl;padding:4px;}
.wg-cell-p{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wg-cell-p.letter-hidden{background:#0a1628;border:2px solid #1a3a6a;}
.wg-cell-p.letter-revealed{background:#0a1628;border:2px solid #2a5fa0;}
.wg-cell-p.space-cell-p{background:#fff;border:2px solid #ddd;}
.wg-char-p{font-size:1rem;font-weight:800;color:#fff;font-family:'Changa','Cairo',sans-serif;}
.wg-logo-p{width:18px;height:18px;opacity:0.4;}

/* FISH */
#fishView{gap:12px;text-align:center;}
.fish-lbl-p{font-size:1rem;color:var(--green);font-weight:700;}
.fish-buzz-btn{background:linear-gradient(135deg,#00c853,#1b5e20);color:#fff;border:none;border-radius:50px;padding:18px 44px;font-size:1.2rem;font-weight:800;font-family:'Changa','Cairo',sans-serif;cursor:pointer;animation:pulseGreen 1.2s ease-in-out infinite;display:none;}
.fish-status{color:var(--muted);font-size:0.82rem;margin-top:4px;}

/* END */
#endView{gap:14px;text-align:center;}
.big-rnd-p{font-size:3.5rem;font-weight:900;color:var(--yellow);line-height:1;}
.big-tot-p{font-size:2rem;font-weight:700;color:var(--green);}

/* FINAL */
#finalView{gap:12px;text-align:center;padding:16px;}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:10px 20px;font-size:0.88rem;font-weight:700;opacity:0;transition:all 0.3s;z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- NAME ENTRY -->
<div id="nameScreen">
  <div class="logo-p" style="text-align:center;margin-bottom:4px">
    <svg width="70" height="70" viewBox="0 0 120 120" style="display:block;margin:0 auto 6px">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#1e1e4a" stroke-width="3"/>
      <path d="M60,5 A55,55 0 0,1 115,60" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M115,60 A55,55 0 0,1 60,115" fill="none" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
      <path d="M60,115 A55,55 0 0,1 5,60" fill="none" stroke="#ffea00" stroke-width="8" stroke-linecap="round"/>
      <path d="M5,60 A55,55 0 0,1 60,5" fill="none" stroke="#ff6d00" stroke-width="8" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="16" fill="#050510" stroke="#00e5ff" stroke-width="2"/>
      <text x="60" y="65" text-anchor="middle" font-size="10" font-weight="900" font-family="Cairo" fill="white" transform="rotate(-5,60,60)">عجلة</text>
    </svg>
    <h1>العجلة</h1>
  </div>
  <div class="name-card">
    <h2>أدخل اسمك للانضمام</h2>
    <input type="text" id="nameInput" placeholder="اسمك هنا" maxlength="20" autocomplete="off"/>
    <button class="btn-join" onclick="joinGame()">انضمام 🎮</button>
  </div>
</div>

<!-- WAITING -->
<div id="waitScreen">
  <div class="wait-card">
    <div style="font-size:3rem;margin-bottom:10px">⏳</div>
    <div style="font-size:1.2rem;font-weight:700;color:var(--cyan);margin-bottom:8px">طلبك أُرسل!</div>
    <div class="wait-name-badge" id="waitNameBadge">اسمك</div>
    <div style="color:var(--muted);font-size:0.88rem">انتظر موافقة المقدم...</div>
    <div id="waitStatus" style="margin-top:10px;font-size:0.8rem;color:var(--muted)"></div>
  </div>
</div>

<!-- REJECTED -->
<div id="rejScreen">
  <div class="wait-card" style="border-color:var(--red)">
    <div style="font-size:2.5rem">❌</div>
    <div style="font-size:1.1rem;font-weight:700;color:var(--red);margin:10px 0">لم يتم القبول</div>
    <div style="color:var(--muted);margin-bottom:16px;font-size:0.88rem">لم يوافق المقدم على انضمامك</div>
    <button class="btn-join" onclick="tryAgain()">حاول مرة أخرى</button>
  </div>
</div>

<!-- PLAYER SCREEN -->
<div id="playerScreen">
  <div class="pheader">
    <span class="my-name-h" id="myNameEl">اللاعب</span>
    <span class="rnd-badge" id="rndBadge">الجولة</span>
  </div>

  <div id="myScoreBar">
    <div class="score-perm">
      <div class="sc-rnd">
        <div class="sc-lbl">نقاط الجولة</div>
        <div class="sc-rnd-v" id="scoreRndVal">0</div>
      </div>
      <div class="sc-div"></div>
      <div class="sc-tot">
        <div class="sc-lbl">المجموع</div>
        <div class="sc-tot-v" id="scoreTotVal">0</div>
      </div>
    </div>
    <div class="helper-bar" id="helperBar">🃏 وسيلة المساعدة متاحة!</div>
  </div>

  <div class="pcontent">

    <!-- WHEEL VIEW -->
    <div class="view" id="wheelView">
      <div class="wwrap-p">
        <div class="wptr-p"></div>
        <canvas id="pc"></canvas>
      </div>
      <div class="spin-hint" id="spinHint">انتظر دورك...</div>
      <button class="spin-btn" id="spinBtn" onclick="triggerSpin()">🎡 الف العجلة!</button>
      <div class="spin-res-p" id="spinResP"></div>
    </div>

    <!-- WORD VIEW -->
    <div class="view" id="wordView">
      <div class="wwrap-p">
        <div class="wptr-p"></div>
        <canvas id="pc2"></canvas>
      </div>
      <span class="cat-p" id="catP">الفئة</span>
      <div id="wdispP" style="width:100%;"></div>
      <button class="spin-btn" id="spinBtn2" onclick="triggerSpin()">🎡 الف العجلة!</button>
      <div class="spin-res-p" id="spinResP2"></div>
      <div class="spin-hint" id="spinHint2"></div>
    </div>

    <!-- FISHING VIEW -->
    <div class="view" id="fishView">
      <div class="fish-lbl-p" id="fishLblP">🎣 جولة الصيد</div>
      <div id="fishGridP" style="width:100%;padding:6px;"></div>
      <button class="fish-buzz-btn" id="fishBuzzBtn" onclick="pressFishBuzz()">🙋 أعرف الجواب!</button>
      <div class="fish-status" id="fishBuzzStatus"></div>
    </div>

    <!-- END VIEW -->
    <div class="view" id="endView">
      <div style="font-size:1rem;color:var(--cyan);font-weight:700">🎉 انتهت الجولة!</div>
      <div style="font-size:0.78rem;color:var(--muted)" id="endRndName"></div>
      <div style="font-size:0.72rem;color:var(--muted)">نقاطك في هذه الجولة</div>
      <div class="big-rnd-p" id="myRndP">0</div>
      <div style="font-size:0.72rem;color:var(--muted)">مجموع نقاطك</div>
      <div class="big-tot-p" id="myTotP">0</div>
    </div>

    <!-- FINAL VIEW -->
    <div class="view" id="finalView">
      <div style="font-size:1.4rem;font-weight:900;color:var(--yellow)">🏆 انتهت اللعبة!</div>
      <div id="finalRankEl" style="margin-top:12px;width:100%;max-width:300px"></div>
    </div>

  </div>
</div>

<div class="toast" id="toastEl"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyASPPu2V3ZPeJOMTYK_1A-1LxJz-CFFCmc",
  authDomain:"al-ajala.firebaseapp.com",
  databaseURL:"https://al-ajala-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"al-ajala",
  storageBucket:"al-ajala.firebasestorage.app",
  messagingSenderId:"634499303447",
  appId:"1:634499303447:web:4a6a6841db4652ab083452"
};
const app = initializeApp(FB);
const db  = getDatabase(app);

// ===== STATE =====
let myName = '', myIdx = -1, isApproved = false;
let wAng = 0, wAng2 = 0, spinning = false, canSpin = false;
let lastGameTs = 0, lastRound = -1;
let currentSlices = null;
let lastPhase = 'idle', lastRType = 'wheel';

// ===== COLORS =====
const COLOR_MAP = {
  '100':'#1565C0','35':'#2E7D32','200':'#6A1B9A','25':'#00838F',
  '45':'#2E7D32','15':'#AD1457','50':'#2E7D32','40':'#00838F',
  '20':'#AD1457','30':'#1565C0',
  'راحت عليك':'#37474F','إفلاس':'#B71C1C',
  'عطيناك ثنتين':'#4527A0','وسيلة مساعدة':'#00695C','تحدي':'#BF360C'
};
const COLORS_CYCLE = ['#1565C0','#2E7D32','#6A1B9A','#00838F','#AD1457','#E65100'];
function colorFor(lbl, idx){ return COLOR_MAP[lbl] || COLORS_CYCLE[idx % COLORS_CYCLE.length]; }

// ===== CANVAS SETUP =====
const canvas  = document.getElementById('pc');
const canvas2 = document.getElementById('pc2');
let hCtx1, hCtx2, canvasSize;

function setupHiDPI(cvs, size){
  const dpr = window.devicePixelRatio || 1;
  cvs.width  = size * dpr;
  cvs.height = size * dpr;
  cvs.style.width  = size + 'px';
  cvs.style.height = size + 'px';
  const ctx = cvs.getContext('2d');
  ctx.scale(dpr, dpr);
  return ctx;
}

function initCanvases(){
  canvasSize = Math.min(window.innerWidth - 36, 210);
  hCtx1 = setupHiDPI(canvas,  canvasSize);
  hCtx2 = setupHiDPI(canvas2, canvasSize);
  drawW(); drawW2();
}
initCanvases();
window.addEventListener('resize', initCanvases);

function drawWheelOnCtx(ctx, size, slices, ang){
  const W = size, cx = W/2, cy = W/2, r = W/2 - 3;
  ctx.clearRect(0, 0, W, W);
  const n = slices.length, arc = 2*Math.PI/n;
  for(let i = 0; i < n; i++){
    const s = ang + i*arc - Math.PI/2, e = s + arc;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
    ctx.fillStyle = colorFor(slices[i].l, i); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(s + arc/2); ctx.textAlign = 'right';
    ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 3;
    const lbl = slices[i].l;
    const fs = lbl.length > 5 ? 7 : lbl.length > 3 ? 8.5 : 11;
    ctx.font = `800 ${fs}px 'Changa','Cairo',sans-serif`;
    ctx.fillText(lbl, r - 5, fs * 0.38);
    ctx.restore();
  }
  const hr = W * 0.1;
  ctx.beginPath(); ctx.arc(cx, cy, hr, 0, 2*Math.PI);
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, hr);
  g.addColorStop(0, '#1a1a3e'); g.addColorStop(1, '#050510');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `800 ${Math.floor(hr*0.6)}px 'Changa','Cairo',sans-serif`;
  ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 2;
  ctx.fillText('عجلة', cx, cy + hr*0.22);
  ctx.shadowBlur = 0;
}

function getSlices(){
  if(currentSlices && currentSlices.length > 0) return currentSlices;
  return [
    {l:'100'},{l:'35'},{l:'200'},{l:'25'},{l:'35'},{l:'45'},{l:'15'},{l:'100'},
    {l:'20'},{l:'50'},{l:'25'},{l:'40'},{l:'20'},{l:'45'},{l:'30'},{l:'50'},
    {l:'راحت عليك'},{l:'راحت عليك'},{l:'إفلاس'},{l:'عطيناك ثنتين'},
    {l:'وسيلة مساعدة'},{l:'تحدي'},{l:'تحدي'}
  ];
}
function drawW(){  if(hCtx1) drawWheelOnCtx(hCtx1, canvasSize, getSlices(), wAng);  }
function drawW2(){ if(hCtx2) drawWheelOnCtx(hCtx2, canvasSize, getSlices(), wAng2); }

// ===== LOGO SVG =====
const LOGO_SVG = `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="60" r="52" fill="none" stroke="#1a5fa8" stroke-width="6"/><path d="M60,8 A52,52 0 0,1 112,60" fill="none" stroke="#1a5fa8" stroke-width="10" stroke-linecap="round"/><path d="M112,60 A52,52 0 0,1 60,112" fill="none" stroke="#1565a0" stroke-width="10" stroke-linecap="round"/><path d="M60,112 A52,52 0 0,1 8,60" fill="none" stroke="#1a5fa8" stroke-width="10" stroke-linecap="round"/><path d="M8,60 A52,52 0 0,1 60,8" fill="none" stroke="#1565a0" stroke-width="10" stroke-linecap="round"/><circle cx="60" cy="60" r="15" fill="none" stroke="#1a5fa8" stroke-width="4"/><text x="60" y="65" text-anchor="middle" font-size="9" font-weight="900" font-family="Changa,Cairo" fill="#1a5fa8">عجلة</text></svg>`;

// ===== WORD GRID =====
function renderWordGrid(wd, containerId){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = '';
  if(!wd || !Array.isArray(wd) || wd.length === 0) return;
  const row = document.createElement('div');
  row.className = 'word-grid-p';
  wd.forEach(cell => {
    const div = document.createElement('div');
    if(cell.t === 's'){
      div.className = 'wg-cell-p space-cell-p';
      div.innerHTML = `<div class="wg-logo-p">${LOGO_SVG}</div>`;
    } else {
      div.className = 'wg-cell-p ' + (cell.r ? 'letter-revealed' : 'letter-hidden');
      if(cell.r){
        const s = document.createElement('span');
        s.className = 'wg-char-p';
        s.textContent = cell.ch;
        div.appendChild(s);
      } else {
        div.innerHTML = `<div class="wg-logo-p">${LOGO_SVG}</div>`;
      }
    }
    row.appendChild(div);
  });
  el.appendChild(row);
}

// ===== JOIN =====
window.joinGame = function(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ alert('أدخل اسمك'); return; }
  myName = name;
  document.getElementById('waitNameBadge').textContent = name;
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('waitScreen').style.display = 'flex';
  push(ref(db,'joinReqs'), {name, ts: Date.now()});
  watchForApproval();
};

window.tryAgain = function(){
  document.getElementById('rejScreen').style.display = 'none';
  document.getElementById('nameScreen').style.display = 'flex';
  myName = ''; isApproved = false;
};

// ===== APPROVAL WATCH =====
function watchForApproval(){
  onValue(ref(db,'game'), snap => {
    const d = snap.val();
    if(!d) return;
    if(isApproved){ handleGameUpdate(d); return; }
    if(d.players && Array.isArray(d.players)){
      const idx = d.players.findIndex(p => p.name === myName);
      if(idx >= 0){
        isApproved = true;
        myIdx = idx;
        document.getElementById('waitScreen').style.display  = 'none';
        document.getElementById('playerScreen').style.display = 'flex';
        document.getElementById('myNameEl').textContent = myName;
        handleGameUpdate(d);
        return;
      }
    }
    if(d.phase === 'lobby'){
      document.getElementById('waitStatus').textContent = 'المقدم يراجع طلبك...';
    }
  });
}

// ===== GAME UPDATE =====
function handleGameUpdate(d){
  if(!d || !isApproved) return;
  if(d.ts === lastGameTs) return;
  lastGameTs = d.ts;

  // Sync slices
  if(d.sliceOrder && Array.isArray(d.sliceOrder)){
    currentSlices = d.sliceOrder.map(l => ({l}));
  }

  // Save phase/rType AFTER declaration
  const rType = d.rType || 'wheel';
  lastPhase   = d.phase  || 'idle';
  lastRType   = rType;

  document.getElementById('rndBadge').textContent = d.rName || 'الجولة';
  updateScore(d);

  if(d.round !== lastRound){ lastRound = d.round; wAng = 0; wAng2 = 0; }
  if(!spinning && d.wheelAngle !== undefined){ wAng = d.wheelAngle; wAng2 = d.wheelAngle; }
  drawW(); drawW2();

  // Routes
  if(d.phase === 'final'){ showView('finalView'); renderFinal(d); return; }

  if(d.phase === 'roundEnd'){
    showView('endView');
    const p = d.players?.[myIdx], rnd = d.round || 0;
    document.getElementById('endRndName').textContent = d.rName || '';
    document.getElementById('myRndP').textContent = p?.rpts?.[rnd] || 0;
    document.getElementById('myTotP').textContent = p?.total || 0;
    return;
  }

  const isMyTurn = (d.turn === myIdx);

  // --- FISHING ---
  if(rType === 'fish' || d.phase === 'fish' || d.phase === 'fish_buzz'){
    showView('fishView');
    document.getElementById('fishLblP').textContent = d.rName || '🎣 جولة الصيد';
    renderWordGrid(d.wd || [], 'fishGridP');

    const used   = Array.isArray(d.fishUsedPlayers) ? d.fishUsedPlayers : [];
    const myUsed = used.includes(myIdx);
    const btn    = document.getElementById('fishBuzzBtn');
    const status = document.getElementById('fishBuzzStatus');

    if(d.phase === 'fish_buzz'){
      btn.style.display = 'none'; btn.disabled = true;
      status.textContent = (d.fishBuzzerPlayer === myIdx)
        ? '⏳ انتظر... يتم التحقق من إجابتك'
        : `⏸ ${d.players?.[d.fishBuzzerPlayer]?.name || ''} يجاوب...`;
    } else if(myUsed){
      btn.style.display = 'none';
      status.textContent = 'استخدمت محاولتك في هذه الجولة';
    } else {
      btn.style.display  = 'inline-block';
      btn.disabled       = false;
      btn.style.opacity  = '1';
      btn.style.animation = 'pulseGreen 1.2s ease-in-out infinite';
      status.textContent = 'كن أول من يجاوب!';
    }
    return;
  }

  // --- WHEEL + WORD ---
  if(d.wd && d.wd.length > 0 && d.cat){
    showView('wordView');
    document.getElementById('catP').textContent = d.cat || 'الفئة';
    renderWordGrid(d.wd, 'wdispP');

    const isSpecial  = (rType === 'special' || d.phase === 'special_guess');
    const canSpinNow = isMyTurn && d.phase === 'idle' && !isSpecial;
    enableSpin2(canSpinNow);

    if(!canSpinNow){
      let hint = '';
      if(isSpecial)              hint = `الجولة الخاصة - دور: ${d.players?.[d.turn]?.name || ''}`;
      else if(d.phase === 'guess') hint = 'انتظر تخمين الحرف...';
      else if(isMyTurn)          hint = 'دورك - الف العجلة!';
      else                       hint = `دور ${d.players?.[d.turn]?.name || ''}`;
      document.getElementById('spinHint2').textContent = hint;
    }
    document.getElementById('spinResP2').textContent = d.sLabel
      ? `${d.sLabel}${d.specialVal ? ' → قيمة الحرف: ' + d.specialVal : ''}` : '';
    return;
  }

  // --- WHEEL ONLY ---
  showView('wheelView');
  const isSpecial  = (rType === 'special');
  const canSpinNow = isMyTurn && d.phase === 'idle' && !isSpecial;
  enableSpin1(canSpinNow);

  if(!canSpinNow){
    let hint = '';
    if(isSpecial)              hint = 'الجولة الخاصة - الهوست يلف العجلة';
    else if(d.phase === 'guess') hint = 'انتظر تخمين الحرف...';
    else if(isMyTurn)          hint = 'دورك!';
    else                       hint = `دور ${d.players?.[d.turn]?.name || ''}`;
    document.getElementById('spinHint').textContent = hint;
  }
  document.getElementById('spinResP').textContent = d.sLabel || '';
}

// ===== SCORE & HELPER =====
function updateScore(d){
  if(!d.players || myIdx < 0 || myIdx >= d.players.length) return;
  const p = d.players[myIdx], rnd = d.round || 0;
  document.getElementById('scoreRndVal').textContent = p.rpts?.[rnd] || 0;
  document.getElementById('scoreTotVal').textContent = (p.total || 0) + ' 🏅';
  document.getElementById('helperBar').style.display = p.helper ? 'block' : 'none';
}

// ===== SPIN CONTROLS =====
function enableSpin1(on){
  canSpin = on;
  document.getElementById('spinBtn').style.display  = on ? 'inline-block' : 'none';
  document.getElementById('spinHint').textContent   = on ? '🎡 اضغط لتلف العجلة!' : 'انتظر دورك...';
  if(on) showToast('دورك! 🎡');
}
function enableSpin2(on){
  canSpin = on;
  document.getElementById('spinBtn2').style.display = on ? 'inline-block' : 'none';
  if(on){
    document.getElementById('spinHint2').textContent = '🎡 اضغط لتلف العجلة!';
    showToast('دورك! 🎡');
  }
}

// ===== SPIN SYNC =====
onValue(ref(db,'spinSync'), snap => {
  const d = snap.val();
  if(!d) return;
  if(d.ts <= (window._lastSpinTs || 0)) return;
  window._lastSpinTs = d.ts;
  animateSpin(d.startAngle, d.totalAngle, d.duration);
});

function animateSpin(startAng, totalAng, dur){
  if(spinning) return;
  spinning = true; canSpin = false;
  document.getElementById('spinBtn').style.display  = 'none';
  document.getElementById('spinBtn2').style.display = 'none';
  document.getElementById('spinHint').textContent   = '🎡 العجلة تدور...';
  document.getElementById('spinHint2').textContent  = '🎡 العجلة تدور...';
  const t0 = performance.now();
  function go(now){
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 4);
    wAng = startAng + totalAng * e; wAng2 = wAng;
    drawW(); drawW2();
    if(p < 1) requestAnimationFrame(go);
    else spinning = false;
  }
  requestAnimationFrame(go);
}

window.triggerSpin = function(){
  if(!canSpin || spinning) return;
  if(lastPhase === 'guess' || lastPhase === 'special_guess'){ showToast('انتظر تخمين الحرف!'); return; }
  if(lastRType === 'special'){ showToast('الجولة الخاصة: الهوست يلف'); return; }
  set(ref(db,'spinReq'), {turn: myIdx, ts: Date.now()});
};

// ===== FISH BUZZER =====
window.pressFishBuzz = function(){
  const btn = document.getElementById('fishBuzzBtn');
  btn.disabled = true;
  btn.style.animation = 'none';
  btn.style.opacity = '0.5';
  set(ref(db,'fishBuzz'), {playerIdx: myIdx, ts: Date.now()});
  document.getElementById('fishBuzzStatus').textContent = '⏳ انتظر رد المقدم...';
};

// ===== FINAL =====
function renderFinal(d){
  if(!d.players) return;
  const sorted = [...d.players].sort((a,b) => (b.total||0) - (a.total||0));
  const medals = ['🥇','🥈','🥉'];
  const el = document.getElementById('finalRankEl');
  el.innerHTML = '';
  sorted.forEach((p, i) => {
    const div = document.createElement('div');
    div.style.cssText = 'margin:8px 0;font-size:1.1rem;font-weight:700;text-align:center;font-family:Changa,Cairo,sans-serif;';
    div.innerHTML = `<span style="color:${p.name===myName?'var(--yellow)':'var(--text)'}">${medals[i]||'🏅'} ${p.name}: ${p.total||0} نقطة</span>`;
    el.appendChild(div);
  });
}

// ===== SHOW VIEW =====
function showView(id){
  ['wheelView','wordView','fishView','endView','finalView'].forEach(v => {
    document.getElementById(v).classList.toggle('active', v === id);
  });
}

// ===== TOAST =====
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Init draw
drawW(); drawW2();
</script>
</body>
</html>
